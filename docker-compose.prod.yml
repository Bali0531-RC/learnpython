services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      judge:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://learn.bali0531.hu}
      JUDGE_API_URL: ${DOCKER_JUDGE_API_URL:-http://judge:8000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@db:5432/erettsegi}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_REVIEW_MODEL: ${OPENAI_REVIEW_MODEL:-gpt-5.4}
      AI_REVIEW_GLOBAL_TOKEN_LIMIT: ${AI_REVIEW_GLOBAL_TOKEN_LIMIT:-2000000}
      AI_REVIEW_GLOBAL_TOKEN_WINDOW_SECONDS: ${AI_REVIEW_GLOBAL_TOKEN_WINDOW_SECONDS:-86400}
    ports:
      - "127.0.0.1:3000:3000"

  judge:
    build:
      context: ./services/judge
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 2g
    memswap_limit: 2g
    storage_opt:
      size: "5G"
    read_only: true
    tmpfs:
      - /tmp:size=5368709120,exec,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    user: "65534:65534"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: erettsegi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erettsegi"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: